# fly.toml app configuration file generated for widget-hub
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "widget-hub-prototype" # 必要に応じてユニークな名前に変更してください
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
