<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Widget Hub | Premium Dashboard</title>
    
    <!-- PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="./style.css" />
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="theme-color" content="#050505">
  </head>
  <body>
    <!-- 1. AUTH SCREEN -->
    <div id="login-screen" class="view-container">
        <!-- LoginPanel will be injected here via main.js -->
    </div>

    <!-- 2. DASHBOARD SCREEN -->
    <div id="dashboard" class="view-container hidden">
        <sidebar-nav></sidebar-nav>
        
        <status-panel id="status-panel"></status-panel>
        <media-panel id="media-panel"></media-panel>
        <x-slideshow id="x-slideshow"></x-slideshow>

        <!-- Settings Button -->
        <div class="settings-btn" id="settings-trigger">
          <ion-icon name="settings-outline"></ion-icon>
        </div>

        <!-- Settings Drawer -->
        <div class="settings-drawer" id="settings-drawer">
            <div class="drawer-header">
                <h3>Settings</h3>
                <button id="close-settings"><ion-icon name="close-outline"></ion-icon></button>
            </div>
            <div class="drawer-content">
                <div class="setting-item">
                    <label>Slide Speed <span id="speed-value" class="setting-value">8s</span></label>
                    <input type="range" id="slide-speed" min="1" max="60" step="1" value="8">
                </div>

                <div class="setting-item">
                    <label>Filter: Category</label>
                    <select id="cat-input" class="modern-select">
                        <option value="">All Categories</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>Filter: Tags</label>
                    <select id="tags-input" class="modern-select">
                        <option value="">All Tags</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>Sync ID (UUID)</label>
                    <div id="sync-key-val" class="sync-key-display">Loading...</div>
                    <p style="font-size: 0.6rem; margin-top: 0.5rem; opacity: 0.5;">Copy this ID to your extension settings.</p>
                </div>

                <div class="setting-item">
                    <label>Extension Status</label>
                    <div id="extension-status" class="status-offline" style="font-size: 0.9rem; font-weight: bold;">OFFLINE</div>
                </div>

                <!-- PWA Install Prompt -->
                <div id="install-section" style="display: none; margin-top: 1rem;">
                  <button id="pwa-install-btn" class="modern-select" style="background: rgba(0,243,255,0.1); border-color: var(--accent-cyan);">
                    Install Dashboard App
                  </button>
                </div>

                <div class="setting-item" style="margin-top: auto; padding-top: 2rem;">
                    <button id="auth-logout" style="width: 100%; padding: 0.8rem; background: rgba(255,62,62,0.1); border: 1px solid rgba(255,62,62,0.3); color: #ff3e3e; border-radius: 8px; cursor: pointer;">Sign Out</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
